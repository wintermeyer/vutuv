name: CI

# Runs the same checks as `mix precommit` (compile --warnings-as-errors,
# unused-deps, format, credo --strict, tests) on every PR and on pushes to
# main, so the deploy on main only fires for code that already passed.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  precommit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vutuv1_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MIX_ENV: test
      # config/test.exs reads the DB host from DATABASE_HOST.
      DATABASE_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          # Pinned to match .tool-versions. Keep these two in sync with that
          # file: a drift here installs the wrong toolchain and reds CI without
          # affecting the deploy (the self-hosted runner builds its own).
          otp-version: "28.5.0.1"
          elixir-version: "1.20.0-otp-28"

      # The key hashes config/*.exs too: compile-time application env for
      # dependencies (e.g. the :mime :types map) is baked into the cached
      # _build, and Elixir's compile-env validation rightly fails the build
      # when a restored cache disagrees with the current config (this turned
      # main red in v7.43.0 when activity+json was registered). restore-keys
      # deliberately dropped for _build: a stale partial restore is exactly
      # the poison the key is meant to prevent.
      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'config/*.exs') }}

      - run: mix deps.get

      - run: mix precommit
